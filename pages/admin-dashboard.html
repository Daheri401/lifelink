<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - LifeLink</title>
  <link rel="stylesheet" href="/css">
</head>
<body class="dashboard">
  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="../index.html" class="logo">
          <img src="../New%20folder/logo.png" alt="LifeLink logo" class="logo-img">
          <span class="logo-text">LifeLink</span>
        </a>
        <nav class="nav">
          <a href="#" class="nav-link active">Dashboard</a>
          <div class="nav-button">
            <button class="btn btn-secondary btn-small" onclick="logout()">Logout</button>
          </div>
        </nav>
        <button class="burger-menu" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>

  <!-- MAIN DASHBOARD -->
  <div class="container">
    <div class="dashboard">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-title">Admin Panel</div>
        <div class="sidebar-menu">
          <a href="#" class="sidebar-link active">
            <span class="sidebar-link-icon">📊</span>
            <span>Dashboard</span>
          </a>
          <a href="#" class="sidebar-link">
            <span class="sidebar-link-icon">🏥</span>
            <span>Hospital Verification</span>
          </a>
          <a href="#" class="sidebar-link">
            <span class="sidebar-link-icon">👥</span>
            <span>Manage Donors</span>
          </a>
          <a href="#" class="sidebar-link">
            <span class="sidebar-link-icon">🩸</span>
            <span>Blood Requests</span>
          </a>
        </div>
        <div class="sidebar-logout">
          <button class="btn btn-secondary btn-block" onclick="logout()">Logout</button>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <h2>Admin Dashboard</h2>

        <!-- STATS -->
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="total-donors">0</div>
            <div class="stat-label">Total Donors</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="total-hospitals">0</div>
            <div class="stat-label">Verified Hospitals</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="requests-month">0</div>
            <div class="stat-label">Requests This Month</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="successful-donations">0</div>
            <div class="stat-label">Successful Donations</div>
          </div>
        </div>

        <!-- PENDING KYC REQUESTS -->
        <div class="card">
          <div class="card-header">
            <h3>📋 Pending KYC Requests</h3>
            <span class="badge" id="kyc-count" style="background-color: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">0</span>
          </div>
          <div class="card-body">
            <div id="pending-kyc-list">
              <!-- Pending KYC requests will be loaded here -->
            </div>
          </div>
        </div>

        <!-- HOSPITAL VERIFICATION -->
        <div class="card">
          <div class="card-header">
            <h3>🏥 Hospital Verification</h3>
          </div>
          <div class="card-body">
            <div id="hospital-verification-list">
              <!-- Hospitals pending verification will be loaded here -->
            </div>
          </div>
        </div>

        <!-- RECENT ACTIVITY -->
        <div class="card">
          <div class="card-header">
            <h3>📋 Recent Blood Requests</h3>
          </div>
          <div class="card-body">
            <div id="recent-requests">
              <!-- Recent requests will be loaded here -->
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
<script src="../js/qrcode.min.js">

</script>
  <script src="/js/script.js"></script>
  <script>
    // ========================================
    // PENDING KYC REQUESTS MANAGEMENT
    // ========================================

    async function loadPendingKYCRequests() {
      try {
        const response = await fetch('/api/kyc/requests');
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        const list = document.getElementById('pending-kyc-list');
        const kycCount = document.getElementById('kyc-count');
        
        if (!data.success || !data.requests || data.requests.length === 0) {
          list.innerHTML = '<p class="text-muted">✓ No pending KYC requests</p>';
          kycCount.textContent = '0';
          return;
        }

        kycCount.textContent = data.requests.length;

        list.innerHTML = data.requests.map(request => {
          return `
          <div class="kyc-request-card" style="
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background-color: #f9f9f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
          ">
            <div style="flex: 1; min-width: 200px;">
              <div style="margin-bottom: 8px;">
                <strong style="color: #2c3e50;">📞 Phone:</strong>
                <span style="color: #555; font-family: monospace;">****${request.phone}</span>
              </div>
              <div style="margin-bottom: 8px;">
                <strong style="color: #2c3e50;">🩸 Blood Group:</strong>
                <span style="color: #555; background-color: #fff; padding: 2px 6px; border-radius: 4px; font-weight: bold;">${request.bloodGroup}</span>
              </div>
              <div style="margin-bottom: 8px;">
                <strong style="color: #2c3e50;">📅 Submitted:</strong>
                <span style="color: #555;">${new Date(request.submittedAt).toLocaleDateString()} ${new Date(request.submittedAt).toLocaleTimeString()}</span>
              </div>
              <div style="margin-top: 12px;">
                <img src="${request.idCardPath}" alt="KYC Document" style="width: 180px; max-height: 220px; border-radius: 6px; border: 1px solid #ccc; object-fit: cover;" onerror="this.src='/images/placeholder.png'; this.title='Failed to load image';" />
                <br />
                <a href="${request.idCardPath}" target="_blank" style="color: #3498db; text-decoration: none; font-size: 12px; margin-top: 6px; display: inline-block;" title="Open full size document">
                  🔍 View Full Size
                </a>
              </div>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; flex-direction: column;">
              <button class="btn btn-success btn-small" onclick="approveKYC('${request.phoneFullForAdmin}')">✓ Approve</button>
              <button class="btn btn-danger btn-small" onclick="openRejectModal('${request.phoneFullForAdmin}')">✗ Reject</button>
            </div>
          </div>
        `;
        }).join('');
      } catch (error) {
        document.getElementById('pending-kyc-list').innerHTML = `<p class="text-muted" style="color: #e74c3c;">❌ Error loading requests: ${error.message}</p>`;
      }
    }

    async function approveKYC(phone) {
      if (!confirm('Are you sure you want to approve this KYC submission?')) {
        return;
      }

      try {
        const response = await fetch('/api/kyc/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });

        const result = await response.json();
        
        if (result.success) {
          showSuccessNotification(`✓ KYC approved successfully for ${phone.slice(-4)}`);
          loadPendingKYCRequests(); // Refresh the list
        } else {
          showErrorNotification('Error: ' + result.message);
        }
      } catch (error) {
        showErrorNotification('Failed to approve KYC. Please try again.');
      }
    }

    function openRejectModal(phone) {
      const reason = prompt('Enter rejection reason (leave blank for default message):');
      if (reason !== null) {
        rejectKYC(phone, reason);
      }
    }

    async function rejectKYC(phone, reason) {
      try {
        const response = await fetch('/api/kyc/reject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            phone,
            reason: reason || 'Documents did not meet verification requirements'
          })
        });

        const result = await response.json();
        
        if (result.success) {
          showAlert(`✗ KYC rejected for ${phone.slice(-4)}. User can resubmit.`, 'warning');
          loadPendingKYCRequests(); // Refresh the list
        } else {
          showErrorNotification('Error: ' + result.message);
        }
      } catch (error) {
        showErrorNotification('Failed to reject KYC. Please try again.');
      }
    }

    // ========================================
    // EXISTING DASHBOARD FUNCTIONS
    // ========================================

    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const stats = await response.json();

        document.getElementById('total-donors').textContent = stats.donors;
        document.getElementById('total-hospitals').textContent = stats.hospitals;
        document.getElementById('requests-month').textContent = stats.requestsThisMonth;
        document.getElementById('successful-donations').textContent = stats.successfulDonations;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    async function loadHospitalVerifications() {
      try {
        const response = await fetch('/api/admin/hospitals');
        const hospitals = await response.json();

        const list = document.getElementById('hospital-verification-list');
        if (hospitals.length === 0) {
          list.innerHTML = '<p class="text-muted">No hospitals pending verification</p>';
          return;
        }

        list.innerHTML = hospitals.map(hospital => `
          <div class="card mb-3">
            <div class="card-body">
              <h4>${hospital.hospital_name}</h4>
              <p class="text-muted mb-2">📍 ${hospital.location}</p>
              <p class="text-muted mb-3">📧 ${hospital.email} | 📞 ${hospital.phone}</p>
              <div class="d-flex gap-2">
                <button class="btn btn-success btn-small" onclick="verifyHospital(${hospital.hospital_id}, 'verified')">Verify</button>
                <button class="btn btn-danger btn-small" onclick="verifyHospital(${hospital.hospital_id}, 'rejected')">Reject</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading hospitals:', error);
      }
    }

    async function verifyHospital(hospitalId, status) {
      try {
        const response = await fetch(`/api/admin/hospitals/${hospitalId}/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });

        const result = await response.json();
        if (result.success) {
          alert(`Hospital ${status} successfully!`);
          loadHospitalVerifications();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (error) {
        alert('Error updating hospital status');
      }
    }

    async function loadRecentRequests() {
      try {
        const response = await fetch('/api/requests');
        const requests = await response.json();

        const recent = requests.slice(0, 5);
        const list = document.getElementById('recent-requests');

        if (recent.length === 0) {
          list.innerHTML = '<p class="text-muted">No recent requests</p>';
          return;
        }

        list.innerHTML = recent.map(request => `
          <div class="request-card ${request.urgency_level} mb-3">
            <div class="request-card-top">
              <div>
                <div class="request-blood-type">${request.blood_type}</div>
                <p style="margin: 0; color: var(--color-gray-dark); font-size: 14px;">${request.units_needed} units needed</p>
              </div>
              <span class="request-badge badge-${request.urgency_level}">${request.urgency_level.toUpperCase()}</span>
            </div>
            <h4 style="margin-bottom: 8px;">${request.hospital_name}</h4>
            <p style="margin: 0; color: var(--color-gray-medium); font-size: 13px;">📍 ${request.location}</p>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading requests:', error);
      }
    }

    // Load all data on page load
    loadStats();
    loadPendingKYCRequests();
    loadHospitalVerifications();
    loadRecentRequests();
  </script>
</body>
</html>
