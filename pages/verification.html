<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Your Account - LifeLink</title>
  <link rel="stylesheet" href="/css">
</head>
<body class="auth-page">
  <div class="page-banner" style="--page-banner:url('logo.png');">
    <h2>Verify Your Account</h2>
  </div>
  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="/home" class="logo">
          <img src="../New%20folder/logo.png" alt="LifeLink logo" class="logo-img">
          <span class="logo-text">LifeLink</span>
        </a>
        <nav class="nav">
          <a href="/home" class="nav-link">Back to Home</a>
        </nav>
        <button class="burger-menu" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="container container-sm py-5">
    <div class="card">
      <div class="card-header text-center">
        <h2>Enter Verification Code</h2>
        <p class="text-muted">We sent a 6-digit code to your phone</p>
      </div>

      <div class="card-body">
        <form id="verification-form">
          <div class="form-group">
            <label class="form-label">Verification Code</label>
            <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 24px;">
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
            </div>
            <style>
              .otp-input {
                width: 50px;
                height: 50px;
                font-size: 24px;
                text-align: center;
                border: 2px solid var(--color-gray-light);
                border-radius: 8px;
                font-weight: bold;
              }
              .otp-input:focus {
                border-color: var(--color-deep-red);
                outline: none;
                box-shadow: 0 0 0 3px rgba(183, 28, 28, 0.1);
              }
            </style>
          </div>

          <button type="submit" class="btn btn-primary btn-large mb-3">Verify Account</button>

          <p class="text-center text-muted" style="font-size: 14px;">
            Didn't receive code?
            <a href="#" onclick="handleResendOtp(event)">Resend in <span id="resend-timer">60</span>s</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom text-center">
        <p>&copy; 2026 LifeLink. All rights reserved. | Connecting Lives Through Blood 🩸</p>
      </div>
    </div>
  </footer>

  <script src="/js/script.js"></script>
  <script>
    // Auto-focus next input
    document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
      input.addEventListener('input', () => {
        if (input.value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    // Resend OTP timer
    function handleResendOtp(event) {
      event.preventDefault();
      const timerEl = document.getElementById('resend-timer');
      let seconds = 60;

      timerEl.parentElement.style.opacity = '0.5';

      const interval = setInterval(() => {
        seconds--;
        timerEl.textContent = seconds;

        if (seconds === 0) {
          clearInterval(interval);
          timerEl.parentElement.style.opacity = '1';
        }
      }, 1000);
    }
  </script>
</body>
</html>
