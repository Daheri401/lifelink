<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Details - LifeLink</title>
  <link rel="stylesheet" href="/css">
</head>
<body class="dashboard">
  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="/home" class="logo">
          <img src="../New%20folder/logo.png" alt="LifeLink logo" class="logo-img">
          <span class="logo-text">LifeLink</span>
        </a>
        <nav class="nav">
          <a href="donor-dashboard.html" class="nav-link">Dashboard</a>
          <a href="#" class="nav-link active">Request Details</a>
          <div class="nav-button">
            <button class="btn btn-secondary btn-small" onclick="logout()">Logout</button>
          </div>
        </nav>
        <button class="burger-menu" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="container py-5">
    <div class="row">
      <div class="col col-md-8">
        <div class="card">
          <div class="card-header">
            <h2>Blood Request Details</h2>
          </div>
          <div class="card-body">
            <div id="request-details">
              <!-- Request details will be loaded here -->
            </div>

            <div class="mt-4">
              <button id="respond-btn" class="btn btn-primary btn-large">Respond to Request</button>
              <button class="btn btn-secondary btn-large" onclick="history.back()">Back to Requests</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col col-md-4">
        <div class="card">
          <div class="card-header">
            <h3>Hospital Information</h3>
          </div>
          <div class="card-body">
            <div id="hospital-info">
              <!-- Hospital info will be loaded here -->
            </div>
          </div>
        </div>

        <div class="card mt-4">
          <div class="card-header">
            <h3>Donor Responses</h3>
          </div>
          <div class="card-body">
            <div id="responses-list">
              <!-- Responses will be loaded here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/script.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const requestId = urlParams.get('id');

    async function loadRequestDetails() {
      try {
        const response = await fetch(`/api/requests/${requestId}`, {
          credentials: 'include'
        });
        const request = await response.json();

        document.getElementById('request-details').innerHTML = `
          <div class="mb-4">
            <div class="d-flex align-items-center gap-3 mb-3">
              <span class="badge-blood">${request.blood_type}</span>
              <span class="request-badge badge-${request.urgency_level}">${request.urgency_level.toUpperCase()}</span>
            </div>
            <h3>${request.units_needed} units needed</h3>
            <p class="text-muted">Posted on ${new Date(request.request_date).toLocaleDateString()}</p>
          </div>

          ${request.notes ? `<div class="alert alert-info"><p><strong>Notes:</strong> ${request.notes}</p></div>` : ''}
        `;

        document.getElementById('hospital-info').innerHTML = `
          <h4>${request.hospital_name}</h4>
          <p class="text-muted mb-2">📍 ${request.location}</p>
          <p class="text-muted">📞 ${request.phone}</p>
        `;

        // Load responses if any
        loadResponses();
      } catch (error) {
        console.error('Error loading request details:', error);
      }
    }

    async function loadResponses() {
      // This would load donor responses - placeholder for now
      document.getElementById('responses-list').innerHTML = '<p class="text-muted">No responses yet</p>';
    }

    document.getElementById('respond-btn').addEventListener('click', async () => {
      try {
        const response = await fetch(`/api/requests/${requestId}/respond`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ action: 'accept' })
        });

        const result = await response.json();
        if (result.success) {
          alert('Response sent successfully!');
          window.location.href = 'donor-dashboard.html';
        } else {
          alert('Error: ' + result.message);
        }
      } catch (error) {
        alert('Error sending response');
      }
    });

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        fetch('/api/logout', {
          method: 'POST',
          credentials: 'include'
        }).then(() => {
          window.location.href = '/home';
        });
      }
    }

    loadRequestDetails();
  </script>
</body>
</html>
