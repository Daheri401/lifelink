<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Login - LifeLink</title>
  <link rel="stylesheet" href="/css">
</head>
<body class="auth-page">
  <div class="page-banner" style="--page-banner:url('../New%20folder/auth-banner.jpg');">
    <h2>Welcome Back, Hospital</h2>
  </div>
  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="/home" class="logo">
          <img src="../New%20folder/logo.png" alt="LifeLink logo" class="logo-img">
          <span class="logo-text">LifeLink</span>
        </a>
        <nav class="nav">
          <a href="/home" class="nav-link">Back to Home</a>
          <button id="theme-toggle" title="Toggle dark/light theme">🌙</button>
        </nav>
        <button class="burger-menu" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="container container-sm py-5">
    <div class="card">
      <div class="card-header text-center">
        <h2>Hospital Login</h2>
        <p class="text-muted">Access your hospital dashboard</p>
      </div>

      <div class="card-body">
        <!-- Alert container for error/success messages -->
        <div id="login-alert" style="display: none; padding: 12px; margin-bottom: 16px; border-radius: 4px; border: 1px solid; font-weight: 500;"></div>

        <form id="hospital-login-form">
          <div class="form-group">
            <label class="form-label" for="login-identifier">Email or Registration Number</label>
            <input type="text" id="login-identifier" class="form-input" placeholder="contact@hospital.com or reg number" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="hospital-password">Password</label>
            <input type="password" id="hospital-password" class="form-input" placeholder="Enter your password" required>
          </div>

          <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="form-check">
              <input type="checkbox" id="remember-me" class="form-check-input">
              <label class="form-check-label" for="remember-me">Remember me</label>
            </div>
            <a href="#" class="text-link">Forgot password?</a>
          </div>

          <button type="submit" id="hospital-login-btn" class="btn btn-primary btn-large mb-3">Login</button>

          <p class="text-center text-muted">
            Not registered yet? 
            <a href="/hospital-signup">Register your hospital</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom text-center">
        <p>&copy; 2026 LifeLink. All rights reserved. | Connecting Lives Through Blood 🩸</p>
      </div>
    </div>
  </footer>

  <script src="/js/script.js"></script>
</body>
</html>
